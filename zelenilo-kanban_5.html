<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a1a">
<title>Smart Zelenilo — Komunalni Servis d.o.o.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap');

  :root {
    --bg:       #f0f4f0;
    --col-bg:   #e4ece4;
    --card-bg:  #ffffff;
    --navy:     #1a3a1a;
    --green:    #2d6a2d;
    --greenL:   #4a9e4a;
    --gold:     #c8960c;
    --goldL:    #f0b929;
    --red:      #c0392b;
    --orange:   #e67e22;
    --tx:       #1a2e1a;
    --ts:       #4a6a4a;
    --tm:       #7a9a7a;
    --bo:       #c8dcc8;
    --wh:       #ffffff;
    --shadow:   0 2px 12px rgba(26,58,26,.10);
    --shadow-lg:0 8px 32px rgba(26,58,26,.18);
    --r:        12px;
    --r-sm:     8px;

    /* Kolone */
    --col-todo:   #3b6978;
    --col-wip:    #c8730a;
    --col-done:   #2d6a2d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--tx);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--navy);
    padding: env(safe-area-inset-top,0) 0 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,.25);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    gap: 12px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 38px;
    height: 38px;
    background: var(--green);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border: 1.5px solid rgba(255,255,255,.15);
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: #fff;
    line-height: 1.1;
  }
  .header-sub {
    font-size: 10px;
    color: rgba(255,255,255,.45);
    letter-spacing: .8px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn-add {
    background: var(--goldL);
    color: var(--navy);
    border: none;
    border-radius: 9px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--gold); transform: translateY(-1px); }

  /* Stats bar */
  .stats-bar {
    background: rgba(0,0,0,.2);
    padding: 8px 20px;
    display: flex;
    gap: 20px;
    border-top: 1px solid rgba(255,255,255,.06);
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255,255,255,.6);
  }
  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .stat-num { font-weight: 700; color: #fff; }

  /* ===== BOARD ===== */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 20px;
    min-height: calc(100vh - 120px);
    align-items: start;
  }

  @media (max-width: 768px) {
    .board {
      grid-template-columns: 1fr;
      padding: 12px;
      gap: 12px;
    }
  }

  /* ===== KOLONA ===== */
  .column {
    background: var(--col-bg);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .col-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .col-icon { font-size: 18px; }
  .col-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .3px;
    flex: 1;
    color: #fff;
  }
  .col-count {
    background: rgba(255,255,255,.2);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 20px;
  }
  .col-todo .col-header  { background: var(--col-todo); }
  .col-wip .col-header   { background: var(--col-wip); }
  .col-done .col-header  { background: var(--col-done); }

  .col-body {
    padding: 10px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .col-body.drag-over {
    background: rgba(74,158,74,.08);
    border-radius: 8px;
    outline: 2px dashed var(--greenL);
  }
  .col-add-btn {
    width: 100%;
    background: none;
    border: 1.5px dashed var(--bo);
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    color: var(--tm);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .15s;
    margin-top: 4px;
  }
  .col-add-btn:hover { border-color: var(--greenL); color: var(--green); background: rgba(74,158,74,.05); }

  /* ===== KARTICA ===== */
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 13px;
    box-shadow: 0 1px 6px rgba(26,58,26,.08);
    cursor: grab;
    transition: box-shadow .15s, transform .15s;
    border-left: 3.5px solid transparent;
    position: relative;
    animation: cardIn .2s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:active { cursor: grabbing; }
  .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .card.dragging { opacity: .5; transform: rotate(2deg); }

  .card[data-priority="Hitno"]   { border-left-color: var(--red); }
  .card[data-priority="Visoko"]  { border-left-color: var(--orange); }
  .card[data-priority="Normalno"]{ border-left-color: var(--greenL); }
  .card[data-priority="Nisko"]   { border-left-color: var(--tm); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--tx);
    line-height: 1.3;
    flex: 1;
  }
  .card-menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--tm);
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: all .1s;
    flex-shrink: 0;
    line-height: 1;
  }
  .card-menu-btn:hover { background: var(--bg); color: var(--tx); }

  .card-desc {
    font-size: 12px;
    color: var(--ts);
    line-height: 1.5;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
  }
  .badge-priority-Hitno   { background: #ffebee; color: var(--red); }
  .badge-priority-Visoko  { background: #fff3e0; color: var(--orange); }
  .badge-priority-Normalno{ background: #e8f5e9; color: var(--green); }
  .badge-priority-Nisko   { background: #f5f5f5; color: var(--ts); }
  .badge-djelatnik { background: #e8f0fe; color: #1a6bc4; }
  .badge-rok { background: #fce4ec; color: #ad1457; }
  .badge-rok.ok { background: #e8f5e9; color: var(--green); }
  .badge-foto { background: #f3e5f5; color: #6a1b9a; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--bg);
  }
  .card-date {
    font-size: 10px;
    color: var(--tm);
  }
  .card-actions {
    display: flex;
    gap: 4px;
  }
  .card-act-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 3px 5px;
    border-radius: 5px;
    transition: background .1s;
    color: var(--tm);
  }
  .card-act-btn:hover { background: var(--bg); }

  /* Foto preview */
  .card-photos {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .card-photo-thumb {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    object-fit: cover;
    cursor: pointer;
    border: 1.5px solid var(--bo);
    transition: transform .15s;
  }
  .card-photo-thumb:hover { transform: scale(1.08); }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,58,26,.55);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    padding-top: calc(20px + env(safe-area-inset-top,0));
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--wh);
    border-radius: 18px;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(26,58,26,.3);
    animation: modalIn .2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    background: var(--navy);
    padding: 18px 20px;
    border-radius: 18px 18px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: #fff;
  }
  .modal-close {
    background: rgba(255,255,255,.12);
    border: none;
    color: #fff;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s;
  }
  .modal-close:hover { background: rgba(255,255,255,.22); }
  .modal-body { padding: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--ts);
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 10px 13px;
    border: 1.5px solid var(--bo);
    border-radius: var(--r-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--tx);
    background: var(--wh);
    outline: none;
    transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--greenL);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Upload zona */
  .upload-zone {
    border: 2px dashed var(--bo);
    border-radius: var(--r-sm);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    background: var(--bg);
  }
  .upload-zone:hover { border-color: var(--greenL); background: rgba(74,158,74,.04); }
  .upload-zone input { display: none; }
  .upload-zone-icon { font-size: 28px; margin-bottom: 6px; }
  .upload-zone-text { font-size: 12px; color: var(--ts); }
  .upload-preview {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .upload-thumb-wrap {
    position: relative;
    width: 64px; height: 64px;
  }
  .upload-thumb {
    width: 64px; height: 64px;
    border-radius: 8px;
    object-fit: cover;
    border: 1.5px solid var(--bo);
  }
  .upload-thumb-del {
    position: absolute;
    top: -6px; right: -6px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Modal footer */
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--bg);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .btn {
    padding: 10px 20px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: all .15s;
  }
  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary:hover { background: var(--green); }
  .btn-secondary { background: var(--bg); color: var(--ts); border: 1.5px solid var(--bo); }
  .btn-secondary:hover { background: var(--col-bg); }
  .btn-danger { background: #ffebee; color: var(--red); border: 1.5px solid #ffcdd2; }
  .btn-danger:hover { background: var(--red); color: #fff; }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.9);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    object-fit: contain;
  }
  .lightbox-close {
    position: fixed;
    top: 20px; right: 20px;
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    background: var(--wh);
    border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,.18);
    z-index: 250;
    overflow: hidden;
    display: none;
    min-width: 160px;
    animation: ctxIn .12s ease;
  }
  @keyframes ctxIn {
    from { opacity: 0; transform: scale(.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  .ctx-item {
    padding: 10px 14px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--tx);
    transition: background .1s;
  }
  .ctx-item:hover { background: var(--bg); }
  .ctx-item.danger { color: var(--red); }
  .ctx-sep { height: 1px; background: var(--bg); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom,0));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy);
    color: #fff;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    z-index: 400;
    opacity: 0;
    transition: all .25s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 30px 16px;
    color: var(--tm);
  }
  .empty-state-icon { font-size: 36px; margin-bottom: 8px; }
  .empty-state-text { font-size: 13px; }

  /* Filter bar */
  .filter-bar {
    padding: 10px 20px;
    background: var(--col-bg);
    border-bottom: 1px solid var(--bo);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-select {
    padding: 6px 10px;
    border: 1px solid var(--bo);
    border-radius: 7px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    background: var(--wh);
    color: var(--tx);
    outline: none;
    cursor: pointer;
  }
  .filter-search {
    padding: 6px 12px;
    border: 1px solid var(--bo);
    border-radius: 7px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    background: var(--wh);
    color: var(--tx);
    outline: none;
    flex: 1;
    min-width: 120px;
  }
  .filter-label { font-size: 11px; color: var(--ts); font-weight: 600; }
</style>

  databaseURL: "https://zelenilo-rovinj-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "zelenilo-rovinj",

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-icon">🌿</div>
      <div>
        <div class="header-title">Smart Zelenilo</div>
        <div class="header-sub">Komunalni Servis d.o.o. Rovinj</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-add" onclick="openModal()">＋ Novi zadatak</button>
    </div>
  </div>
  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <div class="stat-dot" style="background:#3b6978"></div>
      <span>Za odraditi: <span class="stat-num" id="st-todo">0</span></span>
    </div>
    <div class="stat-item">
      <div class="stat-dot" style="background:#c8730a"></div>
      <span>U postupku: <span class="stat-num" id="st-wip">0</span></span>
    </div>
    <div class="stat-item">
      <div class="stat-dot" style="background:#2d6a2d"></div>
      <span>Riješeno: <span class="stat-num" id="st-done">0</span></span>
    </div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">🔍</span>
  <input type="text" class="filter-search" id="filterSearch" placeholder="Pretraži zadatke..." oninput="renderBoard()">

  <select class="filter-select" id="filterPriority" onchange="renderBoard()">
    <option value="">Svi prioriteti</option>
    <option value="Hitno">🔴 Hitno</option>
    <option value="Visoko">🟠 Visoko</option>
    <option value="Normalno">🟢 Normalno</option>
    <option value="Nisko">⚪ Nisko</option>
  </select>
</div>

<!-- BOARD -->
<div class="board">
  <div class="column col-todo" id="col-todo">
    <div class="col-header">
      <span class="col-icon">📋</span>
      <span class="col-title">ZA ODRADITI</span>
      <span class="col-count" id="cnt-todo">0</span>
    </div>
    <div class="col-body" id="body-todo" ondragover="onDragOver(event,'todo')" ondrop="onDrop(event,'todo')" ondragleave="onDragLeave(event)">
    </div>
    <div style="padding:0 10px 10px">
      <button class="col-add-btn" onclick="openModal('todo')">＋ Dodaj zadatak</button>
    </div>
  </div>

  <div class="column col-wip" id="col-wip">
    <div class="col-header">
      <span class="col-icon">⚙️</span>
      <span class="col-title">U POSTUPKU</span>
      <span class="col-count" id="cnt-wip">0</span>
    </div>
    <div class="col-body" id="body-wip" ondragover="onDragOver(event,'wip')" ondrop="onDrop(event,'wip')" ondragleave="onDragLeave(event)">
    </div>
    <div style="padding:0 10px 10px">
      <button class="col-add-btn" onclick="openModal('wip')">＋ Dodaj zadatak</button>
    </div>
  </div>

  <div class="column col-done" id="col-done">
    <div class="col-header">
      <span class="col-icon">✅</span>
      <span class="col-title">RIJEŠENO</span>
      <span class="col-count" id="cnt-done">0</span>
    </div>
    <div class="col-body" id="body-done" ondragover="onDragOver(event,'done')" ondrop="onDrop(event,'done')" ondragleave="onDragLeave(event)">
    </div>
    <div style="padding:0 10px 10px">
      <button class="col-add-btn" onclick="openModal('done')">＋ Dodaj zadatak</button>
    </div>
  </div>
</div>

<!-- MODAL: Novi/Uredi zadatak -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Novi zadatak</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Naziv zadatka *</label>
        <input type="text" class="form-input" id="fNaziv" placeholder="npr. Košnja travnjaka — Park Šumica">
      </div>
      <div class="form-group">
        <label class="form-label">Opis / Napomena</label>
        <textarea class="form-textarea" id="fOpis" placeholder="Detalji zadatka, lokacija, posebne napomene..."></textarea>
      </div>
      <div class="form-group">
          <label class="form-label">Prioritet</label>
          <select class="form-select" id="fPriority">
            <option value="Normalno">🟢 Normalno</option>
            <option value="Visoko">🟠 Visoko</option>
            <option value="Hitno">🔴 Hitno</option>
            <option value="Nisko">⚪ Nisko</option>
          </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Rok</label>
          <input type="date" class="form-input" id="fRok">
        </div>
        <div class="form-group">
          <label class="form-label">Stupac</label>
          <select class="form-select" id="fStatus">
            <option value="todo">📋 Za odraditi</option>
            <option value="wip">⚙️ U postupku</option>
            <option value="done">✅ Riješeno</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Fotografije / Dokumenti</label>
        <div class="upload-zone" onclick="document.getElementById('fFiles').click()">
          <input type="file" id="fFiles" multiple accept="image/*,application/pdf" onchange="handleFiles(event)">
          <div class="upload-zone-icon">📎</div>
          <div class="upload-zone-text">Klikni za dodavanje slika ili dokumenata</div>
        </div>
        <div class="upload-preview" id="uploadPreview"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Odustani</button>
      <button class="btn btn-danger" id="btnDelete" style="display:none" onclick="deleteCard()">🗑️ Obriši</button>
      <button class="btn btn-primary" onclick="saveCard()">💾 Spremi</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxEdit()">✏️ Uredi</div>
  <div class="ctx-item" onclick="ctxMoveTo('todo')">📋 Premjesti: Za odraditi</div>
  <div class="ctx-item" onclick="ctxMoveTo('wip')">⚙️ Premjesti: U postupku</div>
  <div class="ctx-item" onclick="ctxMoveTo('done')">✅ Premjesti: Riješeno</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDelete()">🗑️ Obriši</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== FIREBASE SYNC =====
let _fbDb = null, _fbRef = null, _fbSet = null, _fbOnValue = null;

window.addEventListener('fbReady', function(){
  _fbDb = window._db;
  _fbRef = window._ref;
  _fbSet = window._set;
  _fbOnValue = window._onValue;
  initFbListener();
});

function initFbListener(){
  if(!_fbDb) return;
  _fbOnValue(_fbRef(_fbDb, 'zelenilo/kanban'), function(snap){
    const data = snap.val();
    const prevIds = tasks.map(t => t.id);
    const newTasks = data ? Object.values(data).sort((a,b) => (b.created||'').localeCompare(a.created||'')) : [];

    // Provjeri promjene za notifikacije
    newTasks.forEach(t => {
      if(!prevIds.includes(t.id)){
        // Novi zadatak - ne notificiraj ako je naš vlastiti
        if(prevIds.length > 0){
          showBrowserNotif('📋 Novi zadatak', '"' + t.naziv + '" je dodan');
          showToast('📋 Novi zadatak: "' + t.naziv + '"');
        }
      } else {
        const old = tasks.find(x => x.id === t.id);
        if(old && old.status !== t.status){
          showBrowserNotif(colIcon(t.status) + ' Zadatak premješten', '"' + t.naziv + '" → ' + colName(t.status));
          showToast(colIcon(t.status) + ' "' + t.naziv + '" → ' + colName(t.status));
        }
      }
    });

    tasks = newTasks;
    renderBoard();
  });
}

function syncFb(){
  if(!_fbDb) return;
  const obj = {};
  tasks.forEach(t => { obj[t.id.replace(/[.#$[\]]/g,'_')] = t; });
  _fbSet(_fbRef(_fbDb, 'zelenilo/kanban'), obj);
}

// ===== NOTIFIKACIJE =====
function requestNotifPermission(){
  if('Notification' in window && Notification.permission === 'default'){
    Notification.requestPermission();
  }
}

function showBrowserNotif(title, body){
  if('Notification' in window && Notification.permission === 'granted'){
    new Notification(title, {
      body: body,
      icon: 'https://zelenilo-rovinj.github.io/zelenilo/icon-192.png',
      badge: 'https://zelenilo-rovinj.github.io/zelenilo/icon-192.png',
      tag: 'kanban-' + Date.now(),
      vibrate: [200, 100, 200]
    });
  }
}

// ===== PODACI =====


let tasks = JSON.parse(localStorage.getItem('zelenilo_kanban') || '[]');
let editId = null;
let ctxCardId = null;
let dragId = null;
let tmpFiles = []; // [{name, data, type}]

// ===== INIT =====
function init(){

  renderBoard();
}

// ===== SAVE / LOAD =====
function save(){
  localStorage.setItem('zelenilo_kanban', JSON.stringify(tasks));
  syncFb(); // Sinkroniziraj na Firebase
}

// ===== RENDER =====
function renderBoard(){
  const search = (document.getElementById('filterSearch').value||'').toLowerCase();
  const djel = '';
  const prio = document.getElementById('filterPriority').value;

  const cols = ['todo','wip','done'];
  const counts = {todo:0, wip:0, done:0};

  cols.forEach(col => {
    const body = document.getElementById('body-'+col);
    let filtered = tasks.filter(t => t.status === col);

    if(search) filtered = filtered.filter(t =>
      t.naziv.toLowerCase().includes(search) ||
      (t.opis||'').toLowerCase().includes(search) ||
      (t.djelatnik||'').toLowerCase().includes(search)
    );

    if(prio) filtered = filtered.filter(t => t.prioritet === prio);

    counts[col] = tasks.filter(t => t.status === col).length;

    if(!filtered.length){
      body.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">${col==='todo'?'📋':col==='wip'?'⚙️':'✅'}</div>
        <div class="empty-state-text">Nema zadataka</div>
      </div>`;
    } else {
      body.innerHTML = filtered.map(t => renderCard(t)).join('');
    }
  });

  // Counts
  document.getElementById('cnt-todo').textContent = counts.todo;
  document.getElementById('cnt-wip').textContent = counts.wip;
  document.getElementById('cnt-done').textContent = counts.done;
  document.getElementById('st-todo').textContent = counts.todo;
  document.getElementById('st-wip').textContent = counts.wip;
  document.getElementById('st-done').textContent = counts.done;
}

function renderCard(t){
  const today = new Date().toISOString().split('T')[0];
  const rokClass = t.rok ? (t.rok < today ? 'badge-rok' : 'badge-rok ok') : '';
  const rokLabel = t.rok ? fmtDate(t.rok) : '';
  const rokBadge = t.rok ? `<span class="badge ${rokClass}">📅 ${rokLabel}</span>` : '';
  const djelBadge = t.djelatnik ? `<span class="badge badge-djelatnik">👷 ${t.djelatnik.split(' ').slice(-1)[0]}</span>` : '';
  const prioBadge = `<span class="badge badge-priority-${t.prioritet}">${priIcon(t.prioritet)} ${t.prioritet}</span>`;
  const fotoBadge = (t.files||[]).length ? `<span class="badge badge-foto">📎 ${t.files.length}</span>` : '';

  const photos = (t.files||[]).filter(f => f.type && f.type.startsWith('image/'));
  const photoHtml = photos.length ? `<div class="card-photos">
    ${photos.slice(0,4).map(f => `<img class="card-photo-thumb" src="${f.data}" onclick="openLightbox('${f.data}')" draggable="false">`).join('')}
    ${photos.length > 4 ? `<div style="width:48px;height:48px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ts);border:1.5px solid var(--bo)">+${photos.length-4}</div>` : ''}
  </div>` : '';

  const createdStr = t.created ? `<span class="card-date">${fmtDate(t.created)}</span>` : '';

  return `<div class="card" data-id="${t.id}" data-priority="${t.prioritet}"
    draggable="true"
    ondragstart="onDragStart(event,'${t.id}')"
    ondragend="onDragEnd(event)">
    <div class="card-top">
      <div class="card-title">${escHtml(t.naziv)}</div>
      <button class="card-menu-btn" onclick="openCtx(event,'${t.id}')">⋯</button>
    </div>
    ${t.opis ? `<div class="card-desc">${escHtml(t.opis)}</div>` : ''}
    ${photoHtml}
    <div class="card-meta">
      ${prioBadge}
      ${djelBadge}
      ${rokBadge}
      ${fotoBadge}
    </div>
    <div class="card-footer">
      ${createdStr}
      <div class="card-actions">
        <button class="card-act-btn" title="Uredi" onclick="openEdit('${t.id}')">✏️</button>
        <button class="card-act-btn" title="Premjesti naprijed" onclick="moveForward('${t.id}')">→</button>
      </div>
    </div>
  </div>`;
}

// ===== MODAL =====
let defaultStatus = 'todo';

function openModal(status){
  defaultStatus = status || 'todo';
  editId = null;
  tmpFiles = [];
  document.getElementById('fNaziv').value = '';
  document.getElementById('fOpis').value = '';
  document.getElementById('fPriority').value = 'Normalno';
  document.getElementById('fRok').value = '';
  document.getElementById('fStatus').value = defaultStatus;
  document.getElementById('uploadPreview').innerHTML = '';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('modalTitle').textContent = 'Novi zadatak';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fNaziv').focus(), 100);
}

function openEdit(id){
  const t = tasks.find(x => x.id === id);
  if(!t) return;
  editId = id;
  tmpFiles = JSON.parse(JSON.stringify(t.files||[]));
  document.getElementById('fNaziv').value = t.naziv;
  document.getElementById('fOpis').value = t.opis||'';
  document.getElementById('fPriority').value = t.prioritet||'Normalno';
  document.getElementById('fRok').value = t.rok||'';
  document.getElementById('fStatus').value = t.status;
  document.getElementById('btnDelete').style.display = '';
  document.getElementById('modalTitle').textContent = 'Uredi zadatak';
  renderUploadPreview();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  tmpFiles = [];
}

function handleOverlayClick(e){
  if(e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveCard(){
  const naziv = document.getElementById('fNaziv').value.trim();
  if(!naziv){ toast('Unesite naziv zadatka!'); document.getElementById('fNaziv').focus(); return; }

  if(editId){
    const idx = tasks.findIndex(x => x.id === editId);
    if(idx >= 0){
      tasks[idx] = {
        ...tasks[idx],
        naziv,
        opis: document.getElementById('fOpis').value.trim(),
        prioritet: document.getElementById('fPriority').value,
        rok: document.getElementById('fRok').value,
        status: document.getElementById('fStatus').value,
        files: [...tmpFiles],
        updated: new Date().toISOString().split('T')[0],
      };
    }
    toast('Zadatak ažuriran ✅');
  } else {
    tasks.push({
      id: 'k_' + Date.now(),
      naziv,
      opis: document.getElementById('fOpis').value.trim(),
      prioritet: document.getElementById('fPriority').value,
      rok: document.getElementById('fRok').value,
      status: document.getElementById('fStatus').value,
      files: [...tmpFiles],
      created: new Date().toISOString().split('T')[0],
    });
    showBrowserNotif('📋 Novi zadatak', '"' + naziv + '" je dodan');
    toast('Zadatak dodan ✅');
  }
  save();
  renderBoard();
  closeModal();
}

function deleteCard(){
  if(!editId) return;
  if(!confirm('Obrisati ovaj zadatak?')) return;
  tasks = tasks.filter(x => x.id !== editId);
  save(); renderBoard(); closeModal();
  toast('Zadatak obrisan');
}

// ===== FILE UPLOAD =====
function handleFiles(event){
  const files = Array.from(event.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      tmpFiles.push({ name: file.name, type: file.type, data: e.target.result });
      renderUploadPreview();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderUploadPreview(){
  const el = document.getElementById('uploadPreview');
  el.innerHTML = tmpFiles.map((f,i) => {
    if(f.type && f.type.startsWith('image/')){
      return `<div class="upload-thumb-wrap">
        <img class="upload-thumb" src="${f.data}" onclick="openLightbox('${f.data}')">
        <button class="upload-thumb-del" onclick="removeFile(${i})">✕</button>
      </div>`;
    } else {
      return `<div class="upload-thumb-wrap">
        <div class="upload-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px;background:#f5f5f5">📄</div>
        <button class="upload-thumb-del" onclick="removeFile(${i})">✕</button>
      </div>`;
    }
  }).join('');
}

function removeFile(i){
  tmpFiles.splice(i,1);
  renderUploadPreview();
}

// ===== DRAG & DROP =====
function onDragStart(e, id){
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{
    const el = document.querySelector(`[data-id="${id}"]`);
    if(el) el.classList.add('dragging');
  }, 0);
}
function onDragEnd(e){
  document.querySelectorAll('.card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.col-body.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e, col){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.col-body').forEach(el => el.classList.remove('drag-over'));
  document.getElementById('body-'+col).classList.add('drag-over');
}
function onDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove('drag-over');
  }
}
function onDrop(e, col){
  e.preventDefault();
  document.querySelectorAll('.col-body').forEach(el => el.classList.remove('drag-over'));
  if(!dragId) return;
  const t = tasks.find(x => x.id === dragId);
  if(t && t.status !== col){
    t.status = col;
    save(); renderBoard();
    showBrowserNotif(colIcon(col) + ' Zadatak premješten', '"' + t.naziv + '" → ' + colName(col));
    toast(`Premješteno: ${colName(col)}`);
  }
  dragId = null;
}

// Touch drag za mobitel
let touchTask = null, touchClone = null;
document.addEventListener('touchstart', e => {
  const card = e.target.closest('.card');
  if(!card) return;
  touchTask = card.getAttribute('data-id');
}, {passive:true});

// ===== CONTEXT MENU =====
function openCtx(e, id){
  e.preventDefault(); e.stopPropagation();
  ctxCardId = id;
  const menu = document.getElementById('ctxMenu');
  menu.style.display = 'block';
  let x = e.clientX, y = e.clientY;
  if(x + 170 > window.innerWidth) x = window.innerWidth - 175;
  if(y + 220 > window.innerHeight) y = window.innerHeight - 225;
  menu.style.left = x+'px';
  menu.style.top = y+'px';
}
document.addEventListener('click', () => {
  document.getElementById('ctxMenu').style.display = 'none';
});
function ctxEdit(){ if(ctxCardId) openEdit(ctxCardId); }
function ctxDelete(){
  if(!ctxCardId) return;
  if(!confirm('Obrisati zadatak?')) return;
  tasks = tasks.filter(x => x.id !== ctxCardId);
  save(); renderBoard(); toast('Obrisano');
}
function ctxMoveTo(col){
  const t = tasks.find(x => x.id === ctxCardId);
  if(t){ t.status = col; save(); renderBoard(); toast(`Premješteno: ${colName(col)}`); }
}

// ===== MOVE FORWARD =====
function moveForward(id){
  const t = tasks.find(x => x.id === id);
  if(!t) return;
  const order = ['todo','wip','done'];
  const idx = order.indexOf(t.status);
  if(idx < order.length-1){
    t.status = order[idx+1];
    save(); renderBoard();
    showBrowserNotif(colIcon(t.status) + ' Zadatak premješten', '"' + t.naziv + '" → ' + colName(t.status));
    toast(`Premješteno: ${colName(t.status)}`);
  }
}

// ===== LIGHTBOX =====
function openLightbox(src){
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    closeModal();
    closeLightbox();
    document.getElementById('ctxMenu').style.display='none';
  }
});

// ===== UTILS =====
function priIcon(p){
  return {Hitno:'🔴',Visoko:'🟠',Normalno:'🟢',Nisko:'⚪'}[p]||'🟢';
}
function colIcon(c){
  return {todo:'📋', wip:'⚙️', done:'✅'}[c] || '📋';
}
function colName(c){
  return {todo:'Za odraditi',wip:'U postupku',done:'Riješeno'}[c]||c;
}
function fmtDate(d){
  if(!d) return '';
  const p = d.split('-');
  return p[2]+'.'+p[1]+'.'+p[0]+'.';
}
function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// ===== START =====
init();
requestNotifPermission();

// Demo zadaci ako je prazno
if(!tasks.length){
  tasks = [
    { id:'k_1', naziv:'Košnja travnjaka — Park Šumica', opis:'Redovita mjesečna košnja. Obratiti pažnju na rub uz šetnice.',  prioritet:'Normalno', rok: new Date(Date.now()+3*86400000).toISOString().split('T')[0], status:'todo', files:[], created: new Date().toISOString().split('T')[0] },
    { id:'k_2', naziv:'Orezivanje stabala — Obala Palih', opis:'Ukloniti suhe grane iznad šetnice zbog sigurnosti prolaznika.',  prioritet:'Visoko', rok: new Date(Date.now()+1*86400000).toISOString().split('T')[0], status:'todo', files:[], created: new Date().toISOString().split('T')[0] },
    { id:'k_3', naziv:'Sadnja cvijeća — Trg na Lokvi', opis:'Proljetna sadnja sezonskog cvijeća u posude.',  prioritet:'Normalno', rok: new Date(Date.now()+7*86400000).toISOString().split('T')[0], status:'wip', files:[], created: new Date().toISOString().split('T')[0] },
    { id:'k_4', naziv:'Hitna intervencija — srušeno stablo', opis:'Oluja srušila stablo na Carinarnici. Hitno ukloniti s kolnika.',  prioritet:'Hitno', rok: new Date().toISOString().split('T')[0], status:'wip', files:[], created: new Date().toISOString().split('T')[0] },
    { id:'k_5', naziv:'Navodnjavanje — Gradski park', opis:'Provjera i popravak sustava navodnjavanja.',  prioritet:'Nisko', rok:'', status:'done', files:[], created: new Date(Date.now()-2*86400000).toISOString().split('T')[0] },
  ];
  save();
  renderBoard();
}
</script>
</body>
</html>
