<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="description" content="Smart Zelenilo — upravljanje zadacima OJ Zelenilo, Komunalni Servis d.o.o. Rovinj">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="icon-48.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

<title>Smart Zelenilo</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap');

:root {
  --navy:    #1a3a1a;
  --green:   #2d6a2d;
  --greenL:  #4a9e4a;
  --gold:    #c8960c;
  --goldL:   #f0b929;
  --bg:      #f0f4f0;
  --wh:      #ffffff;
  --gw:      #e8f0e8;
  --tx:      #1a2e1a;
  --ts:      #4a6a4a;
  --tm:      #7a9a7a;
  --bo:      #c8dcc8;
  --da:      #c0392b;
  --r:       12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== LOGIN ===== */
#loginScreen {
  position: fixed; inset: 0;
  background: linear-gradient(155deg, #0d1f0d 0%, #1a3a1a 50%, #0d2a0d 100%);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  padding-top: calc(20px + var(--safe-top));
}
.login-box {
  background: rgba(255,255,255,0.97);
  border-radius: 24px;
  padding: 36px 28px;
  width: 100%; max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}
.login-logo {
  text-align: center; margin-bottom: 8px;
}
.login-logo-icon {
  width: 72px; height: 72px;
  background: var(--navy);
  border-radius: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 36px;
  border: 2px solid rgba(200,150,12,0.3);
  margin-bottom: 14px;
}
.login-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px; color: var(--navy);
  text-align: center; margin-bottom: 4px;
}
.login-sub {
  font-size: 11px; color: var(--tm);
  text-align: center; letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 28px;
}
.login-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: var(--ts); margin-bottom: 6px; display: block;
}
.login-input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--bo); border-radius: 10px;
  font-size: 15px; font-family: 'DM Sans', sans-serif;
  color: var(--tx); background: #f8fcf8;
  outline: none; margin-bottom: 14px;
  transition: border-color .15s;
}
.login-input:focus { border-color: var(--greenL); background: #fff; }
.login-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--navy), var(--green));
  color: #fff; border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; letter-spacing: .3px;
  transition: opacity .15s;
}
.login-btn:active { opacity: .85; }
.login-err {
  background: #ffebee; color: var(--da);
  padding: 10px 14px; border-radius: 8px;
  font-size: 13px; text-align: center;
  margin-bottom: 14px; display: none;
}
.login-footer {
  text-align: center; margin-top: 20px;
  font-size: 11px; color: var(--tm);
}

/* ===== HEADER ===== */
.header {
  background: var(--navy);
  padding-top: var(--safe-top);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.25);
}
.header-inner {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 12px 16px; gap: 10px;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 36px; height: 36px;
  background: var(--green); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; border: 1px solid rgba(255,255,255,.15);
}
.header-title {
  font-family: 'DM Serif Display', serif;
  font-size: 18px; color: #fff; line-height: 1.1;
}
.header-sub { font-size: 9px; color: rgba(255,255,255,.45); letter-spacing: .8px; text-transform: uppercase; }
.header-user {
  display: flex; align-items: center; gap: 8px;
}
.user-av {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--greenL));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--navy);
}
.header-add {
  background: var(--goldL); color: var(--navy);
  border: none; border-radius: 8px;
  padding: 8px 14px; font-size: 13px; font-weight: 700;
  font-family: 'DM Sans', sans-serif; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: all .15s; white-space: nowrap;
}
.header-add:active { opacity: .85; transform: scale(.97); }

/* Stats bar */
.stats-bar {
  background: rgba(0,0,0,.2);
  padding: 7px 16px;
  display: flex; gap: 16px;
  border-top: 1px solid rgba(255,255,255,.06);
  overflow-x: auto; scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: rgba(255,255,255,.6);
  white-space: nowrap; flex-shrink: 0;
}
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }
.stat-num { font-weight: 700; color: #fff; }

/* ===== FILTER ===== */
.filter-bar {
  padding: 10px 14px;
  background: var(--wh);
  border-bottom: 1px solid var(--bo);
  display: flex; gap: 8px; flex-wrap: wrap;
}
.filter-input {
  flex: 1; min-width: 120px;
  padding: 8px 12px; border: 1px solid var(--bo);
  border-radius: 8px; font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--tx); outline: none;
}
.filter-select {
  padding: 8px 10px; border: 1px solid var(--bo);
  border-radius: 8px; font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--tx); outline: none; cursor: pointer;
}

/* ===== BOARD ===== */
.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px; padding: 14px;
  align-items: start;
  padding-bottom: calc(14px + var(--safe-bot));
}
@media (max-width: 640px) {
  .board { grid-template-columns: 1fr; }
}

/* ===== COLUMN ===== */
.kb-col {
  background: var(--gw);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 1px 8px rgba(26,58,26,.08);
}
.kb-col-hd {
  padding: 12px 14px;
  display: flex; align-items: center; gap: 8px; color: #fff;
}
.kb-col-hd.todo { background: #3b6978; }
.kb-col-hd.wip  { background: #c8730a; }
.kb-col-hd.done { background: #2d6a2d; }
.kb-col-title { font-size: 13px; font-weight: 700; letter-spacing: .3px; flex: 1; }
.kb-col-cnt {
  background: rgba(255,255,255,.22); color: #fff;
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
}
.kb-col-body {
  padding: 8px; min-height: 100px;
  display: flex; flex-direction: column; gap: 7px;
}
.kb-col-body.drag-over {
  background: rgba(74,158,74,.08);
  outline: 2px dashed var(--greenL);
  border-radius: 8px;
}
.kb-add-btn {
  width: 100%; background: none;
  border: 1.5px dashed var(--bo);
  border-radius: 8px; padding: 9px;
  font-size: 12px; color: var(--tm); cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s; margin-top: 2px;
}
.kb-add-btn:active { border-color: var(--greenL); color: var(--green); }

/* ===== CARD ===== */
.kb-card {
  background: var(--wh);
  border-radius: 10px; padding: 12px;
  border-left: 3.5px solid transparent;
  box-shadow: 0 1px 5px rgba(26,58,26,.07);
  cursor: grab; transition: all .15s;
  animation: cardIn .2s ease;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.kb-card:active { cursor: grabbing; }
.kb-card.dragging { opacity: .45; transform: rotate(1.5deg); }
.kb-card[data-prio="Hitno"]   { border-left-color: #c0392b; }
.kb-card[data-prio="Visoko"]  { border-left-color: #e67e22; }
.kb-card[data-prio="Normalno"]{ border-left-color: var(--greenL); }
.kb-card[data-prio="Nisko"]   { border-left-color: var(--tm); }
.kb-card-title { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
.kb-card-desc {
  font-size: 11px; color: var(--ts); line-height: 1.4; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.kb-card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.kb-badge {
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 20px;
  display: inline-flex; align-items: center; gap: 2px;
}
.b-p-Hitno   { background: #ffebee; color: #c0392b; }
.b-p-Visoko  { background: #fff3e0; color: #e67e22; }
.b-p-Normalno{ background: #e8f5e9; color: #2d6a2d; }
.b-p-Nisko   { background: #f5f5f5; color: var(--ts); }
.b-rok-late  { background: #fce4ec; color: #ad1457; }
.b-rok-ok    { background: #e8f5e9; color: #2d6a2d; }
.b-foto      { background: #f3e5f5; color: #6a1b9a; }
.kb-card-foot {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--bg);
}
.kb-card-date { font-size: 10px; color: var(--tm); }
.kb-card-acts { display: flex; gap: 3px; }
.kb-card-btn {
  background: none; border: none; cursor: pointer;
  font-size: 14px; padding: 4px 6px; border-radius: 6px;
  color: var(--tm); transition: background .1s;
}
.kb-card-btn:active { background: var(--bg); }
.kb-thumbs { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 5px; }
.kb-thumb {
  width: 44px; height: 44px; border-radius: 6px;
  object-fit: cover; cursor: pointer; border: 1px solid var(--bo);
}
.kb-empty { text-align: center; padding: 20px 12px; color: var(--tm); font-size: 12px; }

/* ===== MODAL ===== */
.overlay {
  position: fixed; inset: 0;
  background: rgba(26,58,26,.55);
  backdrop-filter: blur(4px);
  z-index: 200; display: none;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
@media (min-width: 640px) { .overlay { align-items: center; } }
.modal {
  background: var(--wh);
  border-radius: 20px 20px 0 0;
  width: 100%; max-width: 520px;
  max-height: 92vh; overflow-y: auto;
  padding-bottom: var(--safe-bot);
  animation: modalUp .25s ease;
}
@media (min-width: 640px) {
  .modal { border-radius: 20px; max-height: 88vh; }
}
@keyframes modalUp {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-hd {
  background: var(--navy); padding: 18px 20px;
  border-radius: 20px 20px 0 0;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 1;
}
.modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: #fff; }
.modal-close {
  background: rgba(255,255,255,.12); border: none; color: #fff;
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 18px; }
.form-group { margin-bottom: 15px; }
.form-label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: var(--ts); margin-bottom: 6px;
}
.fi {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--bo); border-radius: 9px;
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  color: var(--tx); background: var(--wh); outline: none;
  transition: border-color .15s;
}
.fi:focus { border-color: var(--greenL); }
textarea.fi { resize: vertical; min-height: 75px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.upload-zone {
  border: 2px dashed var(--bo); border-radius: 9px;
  padding: 18px; text-align: center; cursor: pointer;
  background: var(--bg); transition: all .15s;
}
.upload-zone:active { border-color: var(--greenL); }
.upload-preview { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 8px; }
.upload-thumb-wrap { position: relative; width: 58px; height: 58px; }
.upload-thumb {
  width: 58px; height: 58px; border-radius: 8px;
  object-fit: cover; border: 1.5px solid var(--bo);
}
.upload-del {
  position: absolute; top: -6px; right: -6px;
  background: var(--da); color: #fff; border: none;
  border-radius: 50%; width: 20px; height: 20px;
  font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-foot {
  padding: 12px 18px 18px;
  border-top: 1px solid var(--bg);
  display: flex; gap: 8px; justify-content: flex-end;
}
.btn { padding: 10px 18px; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: all .15s; }
.btn:active { opacity: .85; transform: scale(.97); }
.btn-primary { background: var(--navy); color: #fff; }
.btn-secondary { background: var(--bg); color: var(--ts); border: 1.5px solid var(--bo); }
.btn-danger { background: #ffebee; color: var(--da); border: 1.5px solid #ffcdd2; }

/* ===== LIGHTBOX ===== */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.92); z-index: 300;
  display: none; align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 8px; object-fit: contain; }
.lb-close {
  position: fixed; top: calc(16px + var(--safe-top)); right: 16px;
  background: rgba(255,255,255,.2); border: none; color: #fff;
  width: 40px; height: 40px; border-radius: 50%; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: calc(20px + var(--safe-bot));
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--navy); color: #fff;
  padding: 11px 22px; border-radius: 30px;
  font-size: 13px; font-weight: 500;
  z-index: 400; opacity: 0; transition: all .25s;
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== CONFIRM ===== */
.confirm-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 600;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--wh); border-radius: 16px;
  padding: 24px; max-width: 320px; width: 100%;
  box-shadow: 0 16px 40px rgba(0,0,0,.2);
}
.confirm-msg { font-size: 15px; margin-bottom: 20px; text-align: center; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns .btn { flex: 1; }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">🌿</div>
    </div>
    <div class="login-title">Smart Zelenilo</div>
    <div class="login-sub">Komunalni Servis d.o.o. Rovinj</div>

    <div id="loginErr" class="login-err">❌ Pogrešno korisničko ime ili lozinka</div>

    <label class="login-label">Korisničko ime</label>
    <input type="text" id="loginUser" class="login-input" placeholder="morris" autocomplete="username" autocapitalize="none" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">

    <label class="login-label">Lozinka</label>
    <input type="password" id="loginPass" class="login-input" placeholder="••••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">

    <button class="login-btn" onclick="doLogin()">Prijava →</button>

    <div class="login-footer">Rovinj, Hrvatska • 2026.</div>
  </div>
</div>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-logo">🌿</div>
      <div>
        <div class="header-title">Smart Zelenilo</div>
        <div class="header-sub">OJ Zelenilo • Rovinj</div>
      </div>
    </div>
    <div class="header-user">
      <div class="user-av" id="userAv">MP</div>
      <button class="header-add" onclick="openModal()">＋ Zadatak</button>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-dot" style="background:#3b6978"></div>
      Za odraditi: <span class="stat-num" id="st-todo">0</span>
    </div>
    <div class="stat-item">
      <div class="stat-dot" style="background:#c8730a"></div>
      U postupku: <span class="stat-num" id="st-wip">0</span>
    </div>
    <div class="stat-item">
      <div class="stat-dot" style="background:#2d6a2d"></div>
      Riješeno: <span class="stat-num" id="st-done">0</span>
    </div>
  </div>
</div>

<!-- ===== FILTER ===== -->
<div class="filter-bar">
  <input type="text" class="filter-input" id="fSearch" placeholder="🔍 Pretraži zadatke..." oninput="renderBoard()">
  <select class="filter-select" id="fPrio" onchange="renderBoard()">
    <option value="">Svi prioriteti</option>
    <option value="Hitno">🔴 Hitno</option>
    <option value="Visoko">🟠 Visoko</option>
    <option value="Normalno">🟢 Normalno</option>
    <option value="Nisko">⚪ Nisko</option>
  </select>
</div>

<!-- ===== BOARD ===== -->
<div class="board">
  <div class="kb-col">
    <div class="kb-col-hd todo">
      <span>📋</span>
      <span class="kb-col-title">ZA ODRADITI</span>
      <span class="kb-col-cnt" id="cnt-todo">0</span>
    </div>
    <div class="kb-col-body" id="body-todo"
      ondragover="onDragOver(event,'todo')" ondrop="onDrop(event,'todo')" ondragleave="onDragLeave(event)">
    </div>
    <div style="padding:0 8px 10px">
      <button class="kb-add-btn" onclick="openModal('todo')">＋ Dodaj zadatak</button>
    </div>
  </div>

  <div class="kb-col">
    <div class="kb-col-hd wip">
      <span>⚙️</span>
      <span class="kb-col-title">U POSTUPKU</span>
      <span class="kb-col-cnt" id="cnt-wip">0</span>
    </div>
    <div class="kb-col-body" id="body-wip"
      ondragover="onDragOver(event,'wip')" ondrop="onDrop(event,'wip')" ondragleave="onDragLeave(event)">
    </div>
    <div style="padding:0 8px 10px">

        <label class="form-label">Stupac</label>
        <select id="fStatus" class="fi">
          <option value="todo">📋 Za odraditi</option>
          <option value="wip">⚙️ U postupku</option>
          <option value="done">✅ Riješeno</option>
        </select>
      </div>
      <div class="form-group">

        <div class="upload-zone" onclick="document.getElementById('fFiles').click()">

          <div style="font-size:24px;margin-bottom:4px">📎</div>
          <div style="font-size:12px;color:var(--tm)">Klikni za dodavanje slika</div>

      <button class="btn btn-danger" id="btnDel" style="display:none" onclick="deleteTask()">🗑️</button>

    </div>
  </div>
</div>

<!-- ===== LIGHTBOX ===== -->
<div class="lightbox" id="lightbox" onclick="closeLB()">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <img id="lbImg" src="" alt="">
</div>

<!-- ===== CONFIRM ===== -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="btn btn-secondary" onclick="confirmResolve(false)">Odustani</button>
      <button class="btn btn-danger" onclick="confirmResolve(true)">Obriši</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
// ===== KONSTANTE =====
const USERS = {
  'morris':    { name: 'Morris Peruško',   av: 'MP' },
  'dean':      { name: 'Dean Vaci',         av: 'DV' },
  'ervino':    { name: 'Ervino Rudan',      av: 'ER' },
  'kristijan': { name: 'Kristijan Laginja', av: 'KL' },
};
const PASSWORD = 'ZELENILORV!';

// ===== STATE =====
let currentUser = '';
let tasks = [];
let editId = null;
let dragId = null;
let tmpFiles = [];
let lastSeen = {};
let confirmCb = null;

// ===== FIREBASE =====
let fbDb = null, fbRef = null, fbSet = null, fbOnValue = null;

window.addEventListener('fbReady', () => {
  fbDb = window._db; fbRef = window._ref;
  fbSet = window._set; fbOnValue = window._onValue;
  if(currentUser) {
    initFbListener();
    initNotifListener();
    subscribeFCM();
  }
});

function initFbListener() {
  if(!fbDb) return;
  fbOnValue(fbRef(fbDb, 'zelenilo/kanban'), snap => {
    const data = snap.val();
    const prevIds = tasks.map(t => t.id);
    const newTasks = data
      ? Object.values(data).sort((a,b) => (b.created||'').localeCompare(a.created||''))
      : [];

    // Notifikacije za promjene
    newTasks.forEach(t => {
      if(!prevIds.includes(t.id) && prevIds.length > 0) {
        pushNotif('📋 Novi zadatak', '"' + t.naziv + '" je dodan');
        toast('📋 Novi zadatak: "' + t.naziv + '"');
      } else if(lastSeen[t.id] && lastSeen[t.id] !== t.status) {
        pushNotif(colIcon(t.status) + ' Zadatak premješten', '"' + t.naziv + '" → ' + colName(t.status));
        toast(colIcon(t.status) + ' "' + t.naziv + '" → ' + colName(t.status));
      }
      lastSeen[t.id] = t.status;
    });

    tasks = newTasks;
    renderBoard();
  });
}

function syncFb() {
  if(!fbDb) {
    localStorage.setItem('sz_tasks', JSON.stringify(tasks));
    return;
  }
  const obj = {};
  tasks.forEach(t => { obj[t.id.replace(/[.#$[\]]/g,'_')] = t; });
  fbSet(fbRef(fbDb, 'zelenilo/kanban'), obj);
}

// ===== LOGIN =====
function doLogin() {
  const u = (document.getElementById('loginUser').value||'').trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  if(!USERS[u] || p !== PASSWORD) {
    err.style.display = 'block';
    document.getElementById('loginPass').value = '';
    return;
  }
  err.style.display = 'none';
  currentUser = USERS[u].name;
  document.getElementById('userAv').textContent = USERS[u].av;
  document.getElementById('loginScreen').style.display = 'none';

  // Učitaj lokalne podatke dok Firebase ne stigne
  const local = localStorage.getItem('sz_tasks');
  if(local) tasks = JSON.parse(local);
  renderBoard();

  // Inicijaliziraj Firebase
  if(window._fbReady) {
    initFbListener();
    initNotifListener();
  }

  // Spremi login u localStorage
  localStorage.setItem('sz_user', u);

  // Traži dozvolu za notifikacije
  if('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().then(p => {
      if(p === 'granted') subscribeFCM();
    });
  } else if('Notification' in window && Notification.permission === 'granted') {
    subscribeFCM();
  }

  toast('Dobrodošao/la, ' + currentUser.split(' ')[0] + '! 👋');
}

// ===== NOTIFIKACIJE =====
// FCM VAPID ključ i token
const VAPID_KEY = 'BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjZSBjOSwFBDeaGFB7pzJ-7VxF24';
let fcmToken = null;

async function subscribeFCM() {
  try {
    if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: VAPID_KEY
    });
    fcmToken = JSON.stringify(sub);
    localStorage.setItem('sz_push_sub', fcmToken);
    // Spremi subscription na Firebase
    if(window._fbReady && window._db){
      const key = currentUser.replace(/[^a-zA-Z]/g,'_');
      window._set(window._ref(window._db, 'zelenilo/push_subs/' + key), {
        sub: fcmToken, user: currentUser, ts: Date.now()
      });
    }
    console.log('✅ Push subscription aktivna');
  } catch(e) {
    console.log('Push sub err:', e);
  }
}

function pushNotif(title, body) {
  // Pošalji kroz SW (radi i u backgroundu)
  sendNotifViaSW(title, body);

  // 1. Browser notifikacija (kad je app otvorena ili u backgroundu)
  if('Notification' in window && Notification.permission === 'granted') {
    try {
      // Pokušaj kroz Service Worker (za background push)
      if('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(title, {
            body,
            icon: 'icon-192.png',
            badge: 'icon-192.png',
            tag: 'sz-notif',
            renotify: true,
            vibrate: [300, 100, 300, 100, 300],
            sound: 'default',
            actions: [{ action: 'open', title: 'Otvori' }],
            data: { url: './' }
          });
        });
      } else {
        // Fallback - direktna notifikacija
        const n = new Notification(title, {
          body,
          icon: 'icon-192.png',
          badge: 'icon-192.png',
          tag: 'sz-notif',
          renotify: true,
          vibrate: [300, 100, 300, 100, 300],
        });
        n.onclick = () => { window.focus(); n.close(); };
      }
    } catch(e) {
      new Notification(title, { body, icon: 'icon-192.png' });
    }
  }

  // 2. Spremi notifikaciju na Firebase da je vide drugi korisnici kad otvore app
  saveNotifToFb(title, body);
}

function saveNotifToFb(title, body) {
  if(!window._fbReady || !window._db) return;
  const id = 'n_' + Date.now();
  window._set(window._ref(window._db, 'zelenilo/notifications/' + id), {
    title, body,
    from: currentUser,
    ts: Date.now(),
    read: false
  });
}

// Slušaj notifikacije od Firebase (za ostale korisnike)
function initNotifListener() {
  if(!window._fbReady || !window._db) return;
  let firstLoad = true;
  window._onValue(window._ref(window._db, 'zelenilo/notifications'), snap => {
    if(firstLoad){ firstLoad = false; return; } // Preskoči inicijalno učitavanje
    const data = snap.val();
    if(!data) return;
    const notifs = Object.values(data).sort((a,b) => b.ts - a.ts);
    const lastTs = parseInt(localStorage.getItem('sz_last_notif_ts')||'0');
    notifs.forEach(n => {
      if(n.ts > lastTs && n.from !== currentUser){
        // Nova notifikacija od drugog korisnika
        if('Notification' in window && Notification.permission === 'granted'){
          navigator.serviceWorker.ready.then(reg => {
            reg.showNotification(n.title, {
              body: n.body,
              icon: 'icon-192.png',
              badge: 'icon-192.png',
              tag: 'sz-notif-' + n.ts,
              renotify: true,
              vibrate: [300, 100, 300, 100, 300],
              data: { url: './' }
            });
          }).catch(() => {
            new Notification(n.title, { body: n.body, icon: 'icon-192.png' });
          });
        }
        toast(n.title + ': ' + n.body);
      }
    });
    if(notifs.length) localStorage.setItem('sz_last_notif_ts', notifs[0].ts.toString());
  });
}

// ===== RENDER =====
function renderBoard() {
  const s = (document.getElementById('fSearch')?.value||'').toLowerCase();
  const p = document.getElementById('fPrio')?.value||'';

  ['todo','wip','done'].forEach(col => {
    const body = document.getElementById('body-'+col);
    if(!body) return;
    let list = tasks.filter(t => t.status === col);
    if(s) list = list.filter(t => (t.naziv||'').toLowerCase().includes(s) || (t.opis||'').toLowerCase().includes(s));
    if(p) list = list.filter(t => t.prioritet === p);
    const total = tasks.filter(t => t.status === col).length;
    document.getElementById('cnt-'+col).textContent = total;
    document.getElementById('st-'+col).textContent = total;
    body.innerHTML = list.length ? list.map(renderCard).join('') : '<div class="kb-empty">Nema zadataka</div>';
  });
}

function renderCard(t) {
  const today = new Date().toISOString().split('T')[0];
  const rokCls = t.rok ? (t.rok < today ? 'b-rok-late' : 'b-rok-ok') : '';
  const rokB = t.rok ? `<span class="kb-badge ${rokCls}">📅 ${fmtD(t.rok)}</span>` : '';
  const fotos = (t.files||[]).filter(f => f.type?.startsWith('image/'));
  const fotoB = (t.files||[]).length ? `<span class="kb-badge b-foto">📎 ${t.files.length}</span>` : '';
  const pIcon = {Hitno:'🔴',Visoko:'🟠',Normalno:'🟢',Nisko:'⚪'}[t.prioritet]||'🟢';
  const thumbsHtml = fotos.length ? `<div class="kb-thumbs">${
    fotos.slice(0,3).map(f => `<img class="kb-thumb" src="${f.data}" onclick="openLB('${f.data}')" draggable="false">`).join('')
  }${fotos.length>3?`<div style="width:44px;height:44px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ts)">+${fotos.length-3}</div>`:''}</div>` : '';
  const by = t.createdBy ? ' · ' + t.createdBy.split(' ')[0] : '';

  return `<div class="kb-card" data-id="${t.id}" data-prio="${t.prioritet}"
    draggable="true"
    ondragstart="onDragStart(event,'${t.id}')"
    ondragend="onDragEnd(event)">
    <div class="kb-card-title">${esc(t.naziv||'')}</div>
    ${t.opis ? `<div class="kb-card-desc">${esc(t.opis)}</div>` : ''}
    ${thumbsHtml}
    <div class="kb-card-meta">
      <span class="kb-badge b-p-${t.prioritet}">${pIcon} ${t.prioritet}</span>
      ${rokB}${fotoB}
    </div>
    <div class="kb-card-foot">
      <span class="kb-card-date">${fmtD(t.created||'')}${by}</span>
      <div class="kb-card-acts">
        <button class="kb-card-btn" onclick="openEdit('${t.id}')">✏️</button>
        <button class="kb-card-btn" onclick="moveNext('${t.id}')">→</button>
      </div>
    </div>
  </div>`;
}

// ===== MODAL =====
function openModal(status) {
  editId = null; tmpFiles = [];
  document.getElementById('fNaziv').value = '';
  document.getElementById('fOpis').value = '';
  document.getElementById('fPrioF').value = 'Normalno';
  document.getElementById('fRok').value = '';
  document.getElementById('fStatus').value = status || 'todo';
  document.getElementById('uploadPreview').innerHTML = '';
  document.getElementById('btnDel').style.display = 'none';
  document.getElementById('modalTitle').textContent = 'Novi zadatak';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fNaziv').focus(), 150);
}

function openEdit(id) {
  const t = tasks.find(x => x.id === id);
  if(!t) return;
  editId = id; tmpFiles = JSON.parse(JSON.stringify(t.files||[]));
  document.getElementById('fNaziv').value = t.naziv||'';
  document.getElementById('fOpis').value = t.opis||'';
  document.getElementById('fPrioF').value = t.prioritet||'Normalno';
  document.getElementById('fRok').value = t.rok||'';
  document.getElementById('fStatus').value = t.status||'todo';
  document.getElementById('btnDel').style.display = '';
  document.getElementById('modalTitle').textContent = 'Uredi zadatak';
  renderUploadPreview();
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  tmpFiles = [];
}

function saveTask() {
  const naziv = document.getElementById('fNaziv').value.trim();
  if(!naziv) { toast('Unesite naziv zadatka!'); document.getElementById('fNaziv').focus(); return; }
  const ns = document.getElementById('fStatus').value;

  if(editId) {
    const i = tasks.findIndex(x => x.id === editId);
    if(i >= 0) {
      const oldStatus = tasks[i].status;
      tasks[i] = { ...tasks[i], naziv,
        opis: document.getElementById('fOpis').value.trim(),
        prioritet: document.getElementById('fPrioF').value,
        rok: document.getElementById('fRok').value,
        status: ns, files: [...tmpFiles],
        updatedBy: currentUser,
        updated: new Date().toISOString().split('T')[0]
      };
      lastSeen[editId] = ns;
      if(oldStatus !== ns) {
        pushNotif(colIcon(ns)+' Zadatak premješten', '"'+naziv+'" → '+colName(ns)+' ('+currentUser.split(' ')[0]+')');
      }
    }
    toast('Zadatak ažuriran ✅');
  } else {
    const id = 'sz_' + Date.now();
    tasks.unshift({
      id, naziv,
      opis: document.getElementById('fOpis').value.trim(),
      prioritet: document.getElementById('fPrioF').value,
      rok: document.getElementById('fRok').value,
      status: ns, files: [...tmpFiles],
      created: new Date().toISOString().split('T')[0],
      createdBy: currentUser
    });
    lastSeen[id] = ns;
    pushNotif('📋 Novi zadatak', '"'+naziv+'" je dodan ('+currentUser.split(' ')[0]+')');
    toast('📋 Zadatak dodan ✅');
  }
  syncFb(); renderBoard(); closeModal();
}

function deleteTask() {
  if(!editId) return;
  showConfirm('Obrisati ovaj zadatak?', () => {
    tasks = tasks.filter(x => x.id !== editId);
    syncFb(); renderBoard(); closeModal();
    toast('Zadatak obrisan');
  });
}

// ===== FILES =====
function handleFiles(e) {
  Array.from(e.target.files).forEach(file => {
    const r = new FileReader();
    r.onload = ev => { tmpFiles.push({name:file.name,type:file.type,data:ev.target.result}); renderUploadPreview(); };
    r.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderUploadPreview() {
  document.getElementById('uploadPreview').innerHTML = tmpFiles.map((f,i) => {
    if(f.type?.startsWith('image/')) {
      return `<div class="upload-thumb-wrap">
        <img class="upload-thumb" src="${f.data}" onclick="openLB('${f.data}')">
        <button class="upload-del" onclick="tmpFiles.splice(${i},1);renderUploadPreview()">✕</button>
      </div>`;
    }
    return `<div class="upload-thumb-wrap">
      <div class="upload-thumb" style="display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--bg)">📄</div>
      <button class="upload-del" onclick="tmpFiles.splice(${i},1);renderUploadPreview()">✕</button>
    </div>`;
  }).join('');
}

// ===== DRAG & DROP =====
function onDragStart(e, id) {
  dragId = id; e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if(el) el.classList.add('dragging');
  }, 0);
}
function onDragEnd() {
  document.querySelectorAll('.kb-card.dragging').forEach(e => e.classList.remove('dragging'));
  document.querySelectorAll('.kb-col-body.drag-over').forEach(e => e.classList.remove('drag-over'));
}
function onDragOver(e, col) {
  e.preventDefault();
  document.querySelectorAll('.kb-col-body').forEach(e => e.classList.remove('drag-over'));
  document.getElementById('body-'+col).classList.add('drag-over');
}
function onDragLeave(e) {
  if(!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, col) {
  e.preventDefault();
  document.querySelectorAll('.kb-col-body').forEach(e => e.classList.remove('drag-over'));
  if(!dragId) return;
  const t = tasks.find(x => x.id === dragId);
  if(t && t.status !== col) {
    t.status = col; t.updatedBy = currentUser;
    lastSeen[t.id] = col;
    syncFb(); renderBoard();
    pushNotif(colIcon(col)+' Premješteno', '"'+t.naziv+'" → '+colName(col)+' ('+currentUser.split(' ')[0]+')');
    toast(colIcon(col)+' "'+t.naziv+'" → '+colName(col));
  }
  dragId = null;
}

function moveNext(id) {
  const t = tasks.find(x => x.id === id); if(!t) return;
  const order = ['todo','wip','done'];
  const i = order.indexOf(t.status);
  if(i < order.length-1) {
    t.status = order[i+1]; t.updatedBy = currentUser;
    lastSeen[t.id] = t.status;
    syncFb(); renderBoard();
    pushNotif(colIcon(t.status)+' Premješteno', '"'+t.naziv+'" → '+colName(t.status)+' ('+currentUser.split(' ')[0]+')');
    toast(colIcon(t.status)+' "'+t.naziv+'" → '+colName(t.status));
  }
}

// ===== LIGHTBOX =====
function openLB(src) { document.getElementById('lbImg').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLB() { document.getElementById('lightbox').classList.remove('open'); }

// ===== CONFIRM =====
function showConfirm(msg, cb) {
  confirmCb = cb;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOverlay').classList.add('open');
}
function confirmResolve(yes) {
  document.getElementById('confirmOverlay').classList.remove('open');
  if(yes && confirmCb) confirmCb();
  confirmCb = null;
}

// ===== TOAST =====
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ===== UTILS =====
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtD(d) { if(!d) return ''; const p=d.split('-'); return p[2]+'.'+p[1]+'.'+p[0]+'.'; }
function colName(c) { return {todo:'Za odraditi',wip:'U postupku',done:'Riješeno'}[c]||c; }
function colIcon(c) { return {todo:'📋',wip:'⚙️',done:'✅'}[c]||'📋'; }

// ===== ESC KEY =====
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') { closeModal(); closeLB(); }
});

// ===== INIT =====
// Auto-login ako je korisnik već prijavljen
(function autoLogin(){
  const saved = localStorage.getItem('sz_user');
  if(saved && USERS[saved]){
    document.getElementById('loginUser').value = saved;
    document.getElementById('loginPass').value = PASSWORD;
    doLogin();
  } else {
    document.getElementById('loginUser').focus();
  }
})();
</script>

<!-- PWA Service Worker -->
<script>
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    console.log('SW registriran');
    // Kad ima novi SW - aktiviraj ga
    reg.addEventListener('updatefound', () => {
      reg.installing.addEventListener('statechange', e => {
        if(e.target.state === 'installed' && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({type:'SKIP_WAITING'});
        }
      });
    });
  }).catch(e => console.log('SW err:', e));

  // Osluškuj poruke od SW
  navigator.serviceWorker.addEventListener('message', e => {
    if(e.data && e.data.type === 'NOTIFICATION') {
      toast(e.data.body);
    }
  });
}

// Globalna funkcija za slanje notifikacije kroz SW (radi i kad je app u backgroundu)
function sendNotifViaSW(title, body) {
  if('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'SHOW_NOTIFICATION', title, body
    });
  } else {
    // Fallback - direktna notifikacija
    if('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, {body, icon:'icon-192.png', badge:'icon-192.png', vibrate:[300,100,300]});
    }
  }
}
</script>
